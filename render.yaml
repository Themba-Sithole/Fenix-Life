# Render Blueprint — Fenix Life API (free tier)
# Deploy: https://dashboard.render.com → New → Blueprint → connect GitHub repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fenix-life-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build --workspace=@fenix/api
    startCommand: npm run start --workspace=@fenix/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
        # Set in Render dashboard, e.g.:
        # https://fenix-life.vercel.app,https://fenix-life-admin.vercel.app,http://localhost:5173,http://localhost:5174
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
